workflows:
  android-build:
    name: ACAP Android
    instance_type: mac_mini_m2
    working_directory: acap_app
    environment:
      flutter: stable
    scripts:
      - name: Switch Flutter version
        script: |
          cd /Users/builder/programs/flutter
          git fetch --tags
          git checkout 3.22.3
          rm -f bin/cache/flutter_tools.snapshot
          rm -f bin/cache/flutter_tools.stamp
          flutter --version
      - name: Get packages
        script: /Users/builder/programs/flutter/bin/flutter pub get
      - name: Build APK
        script: |
          export PATH="/Users/builder/programs/flutter/bin:$PATH"
          echo "flutter.sdk=/Users/builder/programs/flutter" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          cd android && chmod +x gradlew && ./gradlew assembleDebug --stacktrace 2>&1 | tail -50
    artifacts:
      - acap_app/build/app/outputs/apk/debug/app-debug.apk
