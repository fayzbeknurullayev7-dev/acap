workflows:
  android-workflow:
    name: ACAP Android
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Switch Flutter version
        script: |
          flutter version 3.22.0
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
