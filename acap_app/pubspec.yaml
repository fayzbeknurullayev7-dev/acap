name: acap
description: AI Coding Agent Platform — Mobile IDE

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <3.44.0"

dependencies:
  flutter:
    sdk: ">=3.0.0 <3.44.0"

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.1

  # Network
  dio: ^5.4.1
  web_socket_channel: ^2.4.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # Auth
  google_sign_in: ^6.2.1

  # UI
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  lottie: ^3.0.0
  pinput: ^3.0.1

  # Code Editor
  # re_editor: ^0.3.0
  # re_highlight: ^0.0.3

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  equatable: ^2.0.5
  dartz: ^0.10.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  logger: ^2.2.0
  connectivity_plus: ^5.0.2
  package_info_plus: ^5.0.1
  url_launcher: ^6.2.4
  share_plus: ^7.2.2
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: ">=3.0.0 <3.44.0"
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  custom_lint: ^0.6.2
  riverpod_lint: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/fonts/
  # JetBrainsMono fontlari ixtiyoriy. TTF fayllarni
  # https://fonts.google.com/specimen/JetBrains+Mono dan yuklab
  # assets/fonts/ ichiga qo'ying, so'ng quyidagi blokni izohdan chiqaring.
  # Fontlar bo'lmasa ilova tizim monospace shriftiga qaytadi.
