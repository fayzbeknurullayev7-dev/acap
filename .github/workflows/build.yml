name: ACAP Flutter APK Build

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.0
          channel: stable

      - name: Fix Flutter Groovy
        run: |
          GROOVY_FILE="$FLUTTER_ROOT/packages/flutter_tools/gradle/src/main/groovy/flutter.groovy"
          if [ -f "$GROOVY_FILE" ]; then
            sed -i "s/import groovy.xml.QName//" "$GROOVY_FILE" || true
            sed -i "s/def manifest = new XmlParser().parse/def manifest = new groovy.xml.XmlParser().parse/" "$GROOVY_FILE" || true
            sed -i "s/entry.key instanceof groovy.xml.QName/entry.key instanceof String/" "$GROOVY_FILE" || true
          sed -i "s/entry.key instanceof QName/entry.key instanceof String/" "$GROOVY_FILE" || true
          # Fix exec() for Gradle 9
          sed -i "s/project.exec {/providers.exec {/g" "$GROOVY_FILE" || true
          sed -i "s/project.exec(/providers.exec(/g" "$GROOVY_FILE" || true
          fi

      - name: local.properties
        run: echo "flutter.sdk=$FLUTTER_ROOT" > acap_app/android/local.properties

      - name: pub get
        working-directory: acap_app
        run: flutter pub get

      - name: build_runner
        working-directory: acap_app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: APK
        working-directory: acap_app
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: ACAP-release-apk
          path: acap_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
