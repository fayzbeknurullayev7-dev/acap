name: ACAP Flutter APK Build

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Kodni olish
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0
          channel: stable

      - name: local.properties
        working-directory: acap_app/android
        run: echo "flutter.sdk=$FLUTTER_ROOT" > local.properties

      - name: pub get
        working-directory: acap_app
        run: flutter pub get

      - name: build_runner
        working-directory: acap_app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: APK
        working-directory: acap_app
        run: flutter build apk --release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ACAP-release-apk
          path: acap_app/build/app/outputs/flutter-apk/app-release.apk
