name: ACAP Flutter APK Build

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.0
          channel: stable

      - name: local.properties
        run: echo "flutter.sdk=$FLUTTER_ROOT" > acap_app/android/local.properties

      - name: pub get
        working-directory: acap_app
        run: flutter pub get

      - name: build_runner
        working-directory: acap_app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: APK
        working-directory: acap_app/android
        run: ./gradlew assembleRelease

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ACAP-release-apk
          path: "**/*.apk"
          if-no-files-found: warn
