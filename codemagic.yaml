workflows:
  android-build:
    name: ACAP Android
    instance_type: mac_mini_m2
    working_directory: acap_app
    environment:
      flutter: stable
    scripts:
      - name: Patch v1 embedding check
        script: |
          PROJECT_DART="/Users/builder/programs/flutter/packages/flutter_tools/lib/src/project.dart"
          if [ -f "$PROJECT_DART" ]; then
            sed -i '/Build failed due to use of deleted Android v1 embedding/d' "$PROJECT_DART"
            sed -i '/throwToolExit.*v1 embedding/d' "$PROJECT_DART"
            echo "Patched successfully"
          else
            echo "File not found: $PROJECT_DART"
          fi
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug
    artifacts:
      - acap_app/build/app/outputs/flutter-apk/app-debug.apk
