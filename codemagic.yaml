workflows:
  android-build:
    name: ACAP Android
    instance_type: mac_mini_m2
    working_directory: acap_app
    environment:
      flutter: stable
    scripts:
      - name: Switch Flutter version
        script: |
          cd /Users/builder/programs/flutter
          git fetch --tags
          git checkout 3.22.3
          rm -f bin/cache/flutter_tools.snapshot
          rm -f bin/cache/flutter_tools.stamp
          flutter --version
      - name: Get packages
        script: /Users/builder/programs/flutter/bin/flutter pub get
      - name: Build APK
        script: |
          echo "flutter.sdk=/Users/builder/programs/flutter" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          /Users/builder/programs/flutter/bin/flutter build apk --debug
    artifacts:
      - acap_app/build/app/outputs/flutter-apk/app-debug.apk
