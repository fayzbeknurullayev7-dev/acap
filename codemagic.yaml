workflows:
  android-build:
    name: ACAP Android
    instance_type: mac_mini_m2
    working_directory: acap_app
    environment:
      flutter: stable
    scripts:
      - name: Flutter version
        script: flutter --version
      - name: Clean
        script: flutter clean
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - acap_app/build/app/outputs/flutter-apk/app-debug.apk
      - acap_app/build/app/outputs/apk/debug/app-debug.apk
