workflows:
  android-build:
    name: ACAP Android
    instance_type: mac_mini_m2
    working_directory: acap_app
    environment:
      flutter: stable
    scripts:
      - name: Flutter version
        script: flutter --version
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug --no-tree-shake-icons --verbose 2>&1 | tail -100
    artifacts:
      - acap_app/build/app/outputs/flutter-apk/app-debug.apk
